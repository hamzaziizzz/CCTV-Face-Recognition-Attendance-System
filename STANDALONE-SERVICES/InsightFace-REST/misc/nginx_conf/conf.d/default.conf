# Define the upstream group
upstream insightface {
    server insightface-rest-gpu-mig-trt-0:18080;  # Backend instance 1
    server insightface-rest-gpu-mig-trt-1:18080;  # Backend instance 2
}

server {
    listen 18080;
    real_ip_header X-Forwarded-For;

    # Disable buffering for live streams
    proxy_buffering off;
    proxy_cache off;
    proxy_request_buffering off;

    # Adjust the timeouts for real-time communication
    proxy_read_timeout 3600s;  # Allow long connections (adjust as needed)
    proxy_connect_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        proxy_pass http://insightface/;   # Use the upstream group
        client_max_body_size 0;  # Allow large bodies (for streams)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Host $host;

        # Increase buffer sizes if necessary
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
