# Define the upstream group
upstream liveness {
    server face-liveness-detection-gpu0:6969;  # Backend instance 1
    server face-liveness-detection-gpu1:6969;  # Backend instance 2
}

server {
    listen 6969;
    real_ip_header X-Forwarded-For;

    location / {
        proxy_pass http://liveness/;   # Use the upstream group
        client_max_body_size 0;
        proxy_http_version 1.1;
        proxy_request_buffering off;
    }
}
